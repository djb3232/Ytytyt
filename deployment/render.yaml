services:
  - type: web
    name: multi-format-downloader
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_downloader:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: true
    healthCheckPath: /